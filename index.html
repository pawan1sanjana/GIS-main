<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- PWA Meta Tags -->
    <meta name="description" content="Professional mobile GIS app for land mapping with high-precision GPS">
    <meta name="theme-color" content="#4f46e5">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LandMapper">
    <link rel="apple-touch-icon" href="favicon.svg">
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="manifest" href="vanilla_manifest.json">
    
    <!-- Leaflet & Draw CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />

    <title>LandMapper GIS - React Web App</title>
  </head>
  <body class="overflow-hidden touch-manipulation">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Force service worker registration (if you want to keep PWA)
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/vanilla_sw.js')
            .catch(err => console.log('SW registration failed:', err));
        });
      }
    </script>
  </body>
</html>
